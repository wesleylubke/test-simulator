name: Deploy Simulator

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t simulator:${{ github.sha }} .

      - name: Save image
        run: |
          docker save simulator:${{ github.sha }} > simulator.tar

      - name: Copy to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "simulator.tar"
          target: "/opt/test-simulator"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/test-simulator
            docker load < simulator.tar
            docker stop test_simulator || true
            docker rm test_simulator || true
            docker run -d \
              --name test_simulator \
              --restart always \
              -p 127.0.0.1:8081:80 \
              simulator:${{ github.sha }}