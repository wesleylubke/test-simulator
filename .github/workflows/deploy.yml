name: Deploy Simulator

on:
  push:
    branches: [ "main" ]

concurrency:
  group: simulator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, simulator]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync project to deploy directory
        run: |
          mkdir -p /opt/test-simulator
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ /opt/test-simulator/

      - name: Build and start container
        working-directory: /opt/test-simulator
        run: |
          docker compose down || true
          docker compose up -d --build

      - name: Verify container
        run: |
          docker ps
          curl -I http://127.0.0.1:8081 || true