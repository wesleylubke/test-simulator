name: Deploy Simulator

on:
  push:
    branches: [ "main" ]

concurrency:
  group: simulator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure directory
        run: |
          sudo mkdir -p /opt/test-simulator
          sudo chown -R wclubke:wclubke /opt/test-simulator

      - name: Sync project
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".env.deploy" \
            --exclude "app/credentials.json" \
            ./ /opt/test-simulator/

      - name: Deploy container
        working-directory: /opt/test-simulator
        run: |
          docker compose down --remove-orphans || true
          docker rm -f test_simulator || true
          docker compose up -d --build

      - name: Healthcheck
        run: |
          sleep 5
          curl -f http://127.0.0.1:8081 || exit 1

      - name: Logs on failure
        if: failure()
        run: docker logs test_simulator || true
